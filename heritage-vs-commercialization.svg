<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<rect width="1200" height="760" fill="#fbf6ef"/>
<text x="600" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#4b2e24" font-weight="700">Heritage vs. Commercialization</text>

<rect x="90" y="150" width="470" height="470" rx="28" fill="#fffdf9" stroke="#d8cabd" stroke-width="3"/>
<rect x="640" y="150" width="470" height="470" rx="28" fill="#fffdf9" stroke="#d8cabd" stroke-width="3"/>

<text x="325" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#4b2e24" font-weight="700">Heritage</text>
<text x="875" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#4b2e24" font-weight="700">Commercialization</text>

<text x="135" y="280" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• family recipes</text>
<text x="135" y="340" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• seed saving</text>
<text x="135" y="400" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• oral history</text>
<text x="135" y="460" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• hand-taught craft</text>
<text x="135" y="520" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• regional memory</text>

<text x="685" y="280" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• tourism branding</text>
<text x="685" y="340" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• Bourbon Trail growth</text>
<text x="685" y="400" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• menu marketing</text>
<text x="685" y="460" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• large-scale production</text>
<text x="685" y="520" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24">• consumer authenticity</text>

<line x1="560" y1="385" x2="640" y2="385" stroke="#b07a33" stroke-width="8"/>
<polygon points="640,385 615,370 615,400" fill="#b07a33"/>

<text x="600" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#6d5b50">Original class graphic showing the tension at the center of the project argument.</text>
</svg>