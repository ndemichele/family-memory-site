<text x="980" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6d5b50">land • seed • ingredients</text>

<rect x="95" y="430" rx="24" ry="24" width="250" height="130" fill="#fffdf9" stroke="#d8cabd" stroke-width="3"/>
