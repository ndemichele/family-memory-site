<text x="600" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="700">Identity</text>

<rect x="95" y="170" rx="24" ry="24" width="250" height="130" fill="#fffdf9" stroke="#d8cabd" stroke-width="3"/>
<text x="220" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24" font-weight="700">Distilleries</text>
