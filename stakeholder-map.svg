<text x="220" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6d5b50">labor • craft • tourism</text>

<rect x="855" y="170" rx="24" ry="24" width="250" height="130" fill="#fffdf9" stroke="#d8cabd" stroke-width="3"/>
