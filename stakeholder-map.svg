<text x="220" y="546" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6d5b50">menus • pairings • tourism</text>

<rect x="855" y="430" rx="24" ry="24" width="250" height="130" fill="#fffdf9" stroke="#d8cabd" stroke-width="3"/>
<text x="980" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24" font-weight="700">Families &amp;</text>
<text x="980" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#4b2e24" font-weight="700">Community</text>
<text x="980" y="546" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6d5b50">memory • recipes • ritual</text>

<line x1="345" y1="235" x2="490" y2="300" stroke="#4b2e24" stroke-width="4"/>
<line x1="855" y1="235" x2="710" y2="300" stroke="#4b2e24" stroke-width="4"/>
<line x1="345" y1="495" x2="490" y2="400" stroke="#4b2e24" stroke-width="4"/>
<line x1="855" y1="495" x2="710" y2="400" stroke="#4b2e24" stroke-width="4"/>

<text x="600" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6d5b50">Original class graphic showing that Kentucky heritage is created through overlapping systems, not one single source.</text>
